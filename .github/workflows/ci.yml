name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy src
      - name: Test
        run: pytest --cov=provider_selection_agent
      - name: Smoke run
        run: compare-providers --providers examples/providers.csv --criteria config/criteria.yaml --brief examples/project_brief.md --out reports/ci_smoke
      - name: Upload smoke artifacts
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: ci-smoke-report
          path: reports/ci_smoke

  docker:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t provider-selection-agent:ci .
