name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy src
      - name: Test
        run: pytest --cov=provider_selection_agent
      - name: Smoke run
        run: compare-providers --providers examples/providers.csv --criteria config/criteria.yaml --brief examples/project_brief.md --out reports/ci_smoke
